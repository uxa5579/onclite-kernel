name: Build ReSukiSU-only onclite kernel

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Kernel source repo'
        required: true
        default: 'https://github.com/onclite/android_kernel_xiaomi_onc.git'
      source_branch:
        description: 'Kernel source branch, blank = default'
        required: false
        default: ''
      defconfig:
        description: 'Defconfig name'
        required: false
        default: 'onclite_defconfig'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout build kit
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl build-essential bc bison flex libssl-dev libelf-dev zip unzip python3 clang lld llvm gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Fetch kernel source
        env:
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
          SOURCE_BRANCH: ${{ github.event.inputs.source_branch }}
        run: bash scripts/01_fetch_sources.sh

      - name: Prepare defconfig
        env:
          DEFCONFIG: ${{ github.event.inputs.defconfig }}
        run: bash scripts/02_prepare_defconfig.sh

      - name: Integrate ReSukiSU
        run: bash scripts/03_integrate_resukisu.sh

      - name: Enable ReSukiSU-only config flags
        env:
          DEFCONFIG: ${{ github.event.inputs.defconfig }}
        run: bash scripts/04_enable_resukisu_configs.sh

      - name: Build kernel
        env:
          DEFCONFIG: ${{ github.event.inputs.defconfig }}
        run: bash scripts/05_build_kernel.sh

      - name: Pack AnyKernel3
        run: bash scripts/06_pack_anykernel.sh

      - name: Repack raw boot.img
        run: bash scripts/07_repack_boot_img.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-only-onclite-kernel-build
          path: |
            dist/*
            out/.config
