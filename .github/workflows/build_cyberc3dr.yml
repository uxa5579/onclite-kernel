name: Build cyberc3dr onclite KernelSU test

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Kernel source repo"
        required: true
        default: "https://github.com/cyberc3dr/android_kernel_xiaomi_onclite.git"
      source_branch:
        description: "Kernel source branch"
        required: false
        default: "lineage-21-test"
      defconfig:
        description: "Defconfig name"
        required: true
        default: "onclite_defconfig"

concurrency:
  group: build-cyberc3dr-onclite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      CCACHE_DIR: /home/runner/.ccache
      CCACHE_BASEDIR: /home/runner/work/onclite-kernel/onclite-kernel
      CCACHE_NOHASHDIR: "true"
      CCACHE_COMPILERCHECK: content
      USE_CCACHE: "1"

    steps:
      - name: Checkout build kit
        uses: actions/checkout@v4

      - name: Fix scripts permission
        run: |
          set -euo pipefail

          echo "==> Current directory"
          pwd

          echo ""
          echo "==> Root files"
          ls -la

          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -exec sed -i 's/\r$//' {} \;
            chmod +x scripts/*.sh
            echo ""
            echo "==> Scripts"
            ls -la scripts
          else
            echo "ERROR: folder scripts tidak ada"
            exit 1
          fi

          if [ ! -f original_boot.img ]; then
            echo "ERROR: original_boot.img tidak ada di root repo."
            echo "Upload boot CrDroid asli kamu sebagai original_boot.img."
            exit 1
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt update
          sudo apt install -y \
            git \
            curl \
            wget \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            zip \
            unzip \
            python3 \
            python-is-python3 \
            clang \
            lld \
            llvm \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            cpio \
            rsync \
            perl \
            make \
            ccache

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/.ccache
          key: ccache-cyberc3dr-onclite-${{ runner.os }}-${{ github.event.inputs.defconfig }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-cyberc3dr-onclite-${{ runner.os }}-${{ github.event.inputs.defconfig }}-
            ccache-onclite-${{ runner.os }}-${{ github.event.inputs.defconfig }}-
            ccache-onclite-${{ runner.os }}-

      - name: Setup ccache
        run: |
          set -euo pipefail

          mkdir -p "$CCACHE_DIR"
          ccache -M 4G
          ccache -z
          ccache -s | tee ccache_stats_before.txt

      - name: Fetch cyberc3dr kernel source with KernelSU only
        env:
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
          SOURCE_BRANCH: ${{ github.event.inputs.source_branch }}
        run: |
          set -o pipefail

          {
            set -euo pipefail

            echo "==> Fetch cyberc3dr kernel source"
            echo "Source repo   : ${SOURCE_REPO}"
            echo "Source branch : ${SOURCE_BRANCH}"

            rm -rf kernel kernel_source source android_kernel_xiaomi_onc android_kernel_xiaomi_onclite

            if [ -n "${SOURCE_BRANCH}" ]; then
              git clone \
                -b "${SOURCE_BRANCH}" \
                "${SOURCE_REPO}" kernel
            else
              git clone "${SOURCE_REPO}" kernel
            fi

            cd kernel

            echo ""
            echo "==> Git info"
            git log --oneline -5 || true

            echo ""
            echo "==> Show .gitmodules"
            cat .gitmodules || true

            echo ""
            echo "==> Init KernelSU submodule only"
            git submodule sync KernelSU || true

            if git submodule update --init KernelSU; then
              echo "KernelSU submodule OK"
            else
              echo "WARNING: KernelSU submodule gagal, fallback clone KernelSU manual"

              rm -rf KernelSU

              git clone https://github.com/skye-tachyon/KernelSU.git KernelSU || \
              git clone https://github.com/tiann/KernelSU.git KernelSU
            fi

            echo ""
            echo "==> Skip vpnhide-driver submodule"
            echo "vpnhide-driver tidak dibutuhkan untuk test boot KernelSU."

            echo ""
            echo "==> Submodule status"
            git submodule status || true

            echo ""
            echo "==> Defconfig candidates"
            find arch/arm64/configs -maxdepth 1 -type f \( \
              -iname "*onclite*defconfig" -o \
              -iname "*onc*defconfig" -o \
              -iname "*msm8953*defconfig" -o \
              -iname "*sdm632*defconfig" \
            \) | sort || true

            echo ""
            echo "==> KernelSU check"
            if [ -d KernelSU ]; then
              find KernelSU -maxdepth 3 -type f | head -n 80 || true
            else
              echo "WARNING: folder KernelSU tidak ada"
            fi

          } 2>&1 | tee fetch_source.log

      - name: Prepare defconfig
        env:
          DEFCONFIG: ${{ github.event.inputs.defconfig }}
        run: |
          set -o pipefail

          {
            set -euo pipefail
            bash scripts/02_prepare_defconfig.sh
          } 2>&1 | tee prepare_defconfig.log

      - name: Disable vpnhide and enable KernelSU config only
        env:
          DEFCONFIG: ${{ github.event.inputs.defconfig }}
        run: |
          set -o pipefail

          {
            set -euo pipefail

            KERNEL_DIR="kernel"
            DEFCONFIG_PATH="${KERNEL_DIR}/arch/arm64/configs/${DEFCONFIG}"

            if [ ! -f "${DEFCONFIG_PATH}" ]; then
              echo "ERROR: ${DEFCONFIG_PATH} tidak ditemukan"
              echo ""
              echo "Daftar defconfig:"
              ls -la "${KERNEL_DIR}/arch/arm64/configs" | head -n 100
              exit 1
            fi

            echo "==> Normalize defconfig newline"
            python3 - <<PY
from pathlib import Path

p = Path("${DEFCONFIG_PATH}")
data = p.read_bytes()

if data and not data.endswith(b"\\n"):
    p.write_bytes(data + b"\\n")
    print("Added missing final newline:", p)
else:
    print("Final newline OK:", p)
PY

            echo ""
            echo "==> Remove broken vpnhide Kconfig reference"

            if grep -q 'drivers/vpnhide/Kconfig' "${KERNEL_DIR}/drivers/Kconfig"; then
              sed -i '/drivers\/vpnhide\/Kconfig/d' "${KERNEL_DIR}/drivers/Kconfig"
              echo "Removed drivers/vpnhide/Kconfig from drivers/Kconfig"
            else
              echo "No drivers/vpnhide/Kconfig reference found"
            fi

            if [ -f "${KERNEL_DIR}/drivers/Makefile" ]; then
              sed -i '/vpnhide/d' "${KERNEL_DIR}/drivers/Makefile"
              echo "Removed vpnhide from drivers/Makefile if present"
            fi

            echo ""
            echo "==> Remove all old KSU/VPNHIDE related flags from defconfig"

            sed -i '/^CONFIG_VPNHIDE=/d' "${DEFCONFIG_PATH}"
            sed -i '/^# CONFIG_VPNHIDE is not set/d' "${DEFCONFIG_PATH}"

            sed -i '/^CONFIG_KSU=/d' "${DEFCONFIG_PATH}"
            sed -i '/^CONFIG_KSU_/d' "${DEFCONFIG_PATH}"
            sed -i '/^# CONFIG_KSU is not set/d' "${DEFCONFIG_PATH}"
            sed -i '/^# CONFIG_KSU_/d' "${DEFCONFIG_PATH}"

            set_config() {
              local key="$1"
              local val="$2"

              python3 - <<PY
from pathlib import Path

p = Path("${DEFCONFIG_PATH}")
data = p.read_bytes()
if data and not data.endswith(b"\\n"):
    p.write_bytes(data + b"\\n")
PY

              sed -i "/^${key}=/d" "${DEFCONFIG_PATH}"
              sed -i "/^# ${key} is not set/d" "${DEFCONFIG_PATH}"

              if [ "${val}" = "n" ]; then
                echo "# ${key} is not set" >> "${DEFCONFIG_PATH}"
              else
                echo "${key}=${val}" >> "${DEFCONFIG_PATH}"
              fi
            }

            echo ""
            echo "==> Disable vpnhide"
            set_config CONFIG_VPNHIDE n

            echo ""
            echo "==> Enable KernelSU from cyberc3dr source"
            set_config CONFIG_KSU y
            set_config CONFIG_KPROBES y
            set_config CONFIG_KALLSYMS y
            set_config CONFIG_KALLSYMS_ALL y
            set_config CONFIG_OVERLAY_FS y
            set_config CONFIG_MODULES y
            set_config CONFIG_MODULE_UNLOAD y
            set_config CONFIG_SECURITY_SELINUX y

            echo ""
            echo "==> Disable ReSukiSU-specific/manual flags"
            set_config CONFIG_KSU_MANUAL_HOOK n
            set_config CONFIG_KSU_SUSFS n

            echo ""
            echo "==> Final defconfig flags"
            grep -E "CONFIG_VPNHIDE|CONFIG_KSU|CONFIG_KPROBES|CONFIG_KALLSYMS|CONFIG_OVERLAY_FS|CONFIG_MODULES|CONFIG_SECURITY_SELINUX" "${DEFCONFIG_PATH}" || true

            echo ""
            echo "==> Check drivers/Kconfig vpnhide"
            grep -n "vpnhide" "${KERNEL_DIR}/drivers/Kconfig" || true

            echo ""
            echo "==> Check drivers/Makefile vpnhide"
            grep -n "vpnhide" "${KERNEL_DIR}/drivers/Makefile" || true

          } 2>&1 | tee enable_kernelsu_config.log

      - name: Build kernel using original DTB tail
        env:
          DEFCONFIG: ${{ github.event.inputs.defconfig }}
          USE_CCACHE: "1"
        run: |
          set +e
          set -o pipefail

          bash scripts/05_build_kernel.sh 2>&1 \
            | sed -u \
              -e '/aarch64-linux-gnu-objdump: Warning: Unrecognized form/d' \
              -e '/aarch64-linux-gnu-objdump: Warning: Bogus end-of-siblings/d' \
              -e '/aarch64-linux-gnu-objdump: Warning: Further warnings about bogus/d' \
              -e '/aarch64-linux-gnu-objdump: Warning: DIE at offset/d' \
              -e '/Unrecognized form: 0x22/d' \
              -e '/Unrecognized form: 0x23/d' \
              -e '/Bogus end-of-siblings marker/d' \
            | tee build_kernel.log

          BUILD_STATUS=${PIPESTATUS[0]}

          echo ""
          echo "==> Ccache status after build"
          ccache -s | tee ccache_stats.txt || true

          echo ""
          echo "Build status: ${BUILD_STATUS}"
          exit "${BUILD_STATUS}"

      - name: Pack AnyKernel3
        if: success()
        run: |
          set -o pipefail

          {
            set -euo pipefail
            bash scripts/06_pack_anykernel.sh
          } 2>&1 | tee pack_anykernel.log

      - name: Repack raw boot.img
        if: success()
        run: |
          set -o pipefail

          {
            set -euo pipefail
            bash scripts/07_repack_boot_img.sh
          } 2>&1 | tee repack_boot.log

      - name: Fix boot header and rename output
        if: success()
        run: |
          set -euo pipefail

          mkdir -p dist

          BOOT_IN="dist/ReSukiSU-onclite-4.9-boot.img"
          BOOT_OUT="dist/cyberc3dr-KernelSU-onclite-boot-fixed.img"

          if [ ! -f "${BOOT_IN}" ]; then
            echo "WARNING: ${BOOT_IN} tidak ditemukan."
            echo "Isi dist:"
            ls -lh dist || true
            exit 0
          fi

          python3 - <<'PY'
import struct
from pathlib import Path

boot_in = Path("dist/ReSukiSU-onclite-4.9-boot.img")
boot_out = Path("dist/cyberc3dr-KernelSU-onclite-boot-fixed.img")

data = bytearray(boot_in.read_bytes())

if data[:8] != b"ANDROID!":
    raise SystemExit("ERROR: bukan Android boot image")

def get_u32(off):
    return struct.unpack_from("<I", data, off)[0]

def put_u64(off, val):
    struct.pack_into("<Q", data, off, val)

header_version = get_u32(40)

# Android boot image v1:
# recovery_dtbo_size   offset 1632, u32
# recovery_dtbo_offset offset 1636, u64
if header_version >= 1 and len(data) >= 1648:
    recovery_dtbo_size = get_u32(1632)

    if recovery_dtbo_size == 0:
        print("recovery_dtbo_size=0, set recovery_dtbo_offset=0")
        put_u64(1636, 0)
    else:
        print("recovery_dtbo_size bukan 0, offset tidak diubah:", recovery_dtbo_size)
else:
    print("header_version < 1 atau header terlalu kecil, tidak perlu fix recovery_dtbo_offset")

boot_out.write_bytes(data)
print("Wrote:", boot_out)
PY

          if [ -f dist/ReSukiSU-onclite-4.9-AnyKernel3.zip ]; then
            cp dist/ReSukiSU-onclite-4.9-AnyKernel3.zip dist/cyberc3dr-KernelSU-onclite-AnyKernel3.zip
          fi

          echo ""
          echo "==> Final dist files"
          ls -lh dist

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/.ccache
          key: ccache-cyberc3dr-onclite-${{ runner.os }}-${{ github.event.inputs.defconfig }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cyberc3dr-KernelSU-onclite-build
          path: |
            dist/*
            out/.config
            fetch_source.log
            prepare_defconfig.log
            enable_kernelsu_config.log
            build_kernel.log
            pack_anykernel.log
            repack_boot.log
            ccache_stats.txt
            ccache_stats_before.txt
